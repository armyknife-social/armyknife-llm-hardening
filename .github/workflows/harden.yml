name: LLM Hardening Pipeline

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "HuggingFace model ID to scan and harden"
        required: true
        default: "Qwen/Qwen2.5-7B-Instruct"
        type: string
      hf_org:
        description: "HuggingFace organization to publish hardened model"
        required: true
        default: "ArmyknifeLabs"
        type: string
      min_fix_rate:
        description: "Minimum fix rate to pass (0.0 - 1.0)"
        required: false
        default: "0.9"
        type: string

jobs:
  harden:
    name: Scan, Harden, Verify, Publish
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install armyknife-llm-redteam
        run: cargo install armyknife-llm-redteam

      - name: Install securegit
        run: cargo install securegit

      - name: Run full hardening pipeline
        run: |
          securegit hf full-pipeline \
            --model "${{ inputs.model_id }}" \
            --hf-org "${{ inputs.hf_org }}" \
            --provider huggingface \
            --min-fix-rate "${{ inputs.min_fix_rate }}"

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: scan-results/
          retention-days: 90

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: verification-report/
          retention-days: 90

      - name: Check fix rate threshold
        run: |
          if [ -f verification-report/verification-report.json ]; then
            FIX_RATE=$(python3 -c "
          import json
          with open('verification-report/verification-report.json') as f:
              data = json.load(f)
          print(data.get('fix_rate', 0))
          ")
            echo "Fix rate: ${FIX_RATE}"
            python3 -c "
          fix_rate = float('${FIX_RATE}')
          threshold = float('${{ inputs.min_fix_rate }}')
          if fix_rate < threshold:
              print(f'FAIL: Fix rate {fix_rate} is below threshold {threshold}')
              exit(1)
          else:
              print(f'PASS: Fix rate {fix_rate} meets threshold {threshold}')
          "
          else
            echo "No verification report found"
            exit 1
          fi
